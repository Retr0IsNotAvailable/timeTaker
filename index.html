<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Time Taker</title>

    <link href="./styles/general.css" rel="stylesheet"/>
    <link href="./styles/header.css" rel="stylesheet"/>
    <link href="./styles/timeTaker.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="container flexDiv">
      <!-- header part of the website, contains:
       website title on the left side
       Total Time Studying (TTS) on the right side-->
      <header class="flexDiv">
        <div class="headerLeft">
          <h1>Time Taker</h1>
          <button class="resetButton noBorder" title="delete subjects and tts">
            Reset
          </button>
        </div>
        <div class="headerRight">
          <h2>TTS: <span class="tts">0 hours 0 minutes</span></h2>
        </div>
      </header>
      <div class="timeTaker">
        <div class="inputBox flexDiv">
          <input type="number" placeholder="mins"
            class="timeInput"/>
          <input type="text" placeholder="Subject"
            class="subjectInput noBorder"/>
          <button class="addButton noBorder">Add</button>
        </div>
        <ul class="subjects"></ul>
      </div>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
